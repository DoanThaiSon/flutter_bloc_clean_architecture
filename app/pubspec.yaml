name: app
description: A new Flutter project.
publish_to: "none"
version: 1.0.0+1
environment:
  sdk: ">=3.0.5 <4.0.0"

dependency_overrides:
  analyzer: 7.3.0
  dart_style: 3.0.1
  js: ^0.7.0
dependencies:
  async: 2.13.0
  auto_route: 10.0.1
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  cupertino_icons: ^1.0.8
  dartx: 1.2.0
  domain:
    path: ../domain
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_local_notifications: 18.0.0
  flutter_localizations:
    sdk: flutter
  flutter_screenutil: 5.9.0
  flutter_svg: ^2.2.0
  get_it: 8.0.3
  infinite_scroll_pagination: 4.0.0
  initializer:
    path: ../initializer
  #  injectable: 2.3.2
  resources:
    path: ../resources
  #  rxdart: 0.27.7
  shared:
    path: ../shared
  tuple: 2.0.2
  connectivity_plus: ^6.1.0
  webview_flutter: ^4.13.0
  shimmer: ^3.0.0
  latlong2: any
  dropdown_button2: ^2.3.9
  vibration: ^3.1.5
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
#  firebase_core: ^3.10.1
#  firebase_messaging: ^15.2.1
dev_dependencies:
  auto_route_generator: 10.0.1
  bloc_test: ^10.0.0
  build_runner: 2.4.15
  custom_lint: ^0.7.0
  flutter_gen_runner: 5.10.0
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.2
  flutter_test:
    sdk: flutter
  freezed: 2.5.8
  freezed_annotation: 2.4.4
  injectable_generator: 2.7.0
  logging: ^1.3.0
  mocktail: ^1.0.4

# Config generate when build
flutter_gen:
  output: lib/resource/generated
  integrations:
    flutter_svg: true
    # flare_flutter: true

  assets:
    enabled: true

  fonts:
    enabled: true
  # colors:
  #   enabled: true
  #   inputs:
  #     - assets/color/colors.xml
flutter:
  uses-material-design: true
  generate: false
  assets:
    - assets/images/icons/
    - assets/images/svgs/
    - assets/images/pictures/
  fonts:
    - family: InterTight
      fonts:
        - asset: assets/fonts/InterTight-BoldItalic.ttf
        - asset: assets/fonts/InterTight-Bold.ttf
        - asset: assets/fonts/InterTight-ExtraBold.ttf
        - asset: assets/fonts/InterTight-Italic.ttf
        - asset: assets/fonts/InterTight-Regular.ttf
        - asset: assets/fonts/InterTight-Light.ttf
        - asset: assets/fonts/InterTight-Medium.ttf
        - asset: assets/fonts/InterTight-SemiBold.ttf
        - asset: assets/fonts/InterTight-SemiBoldItalic.ttf
        - asset: assets/fonts/InterTight-MediumItalic.ttf
